version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
    versioning-strategy: increase
    groups:
      eslint:
        patterns:
          - '*eslint*'
          - oxlint
          - '@antfu/*'
        update-types: [minor, patch]
      build-tools:
        patterns:
          - typescript
          - release-it
          - '@release-it/*'
          - react-native-builder-bob
          - del-cli
        update-types: [minor, patch]
      babel:
        patterns:
          - '@babel/*'
          - 'babel-*'
        update-types: [minor, patch]
      shiki:
        patterns:
          - '@shikijs/*'
        update-types: [minor, patch]
    ignore:
      - dependency-name: react
      - dependency-name: react-dom
      - dependency-name: react-native
      - dependency-name: '@react-native/*'
      - dependency-name: '@react-native-community/*'
      - dependency-name: expo
      - dependency-name: react-native-safe-area-context
      - dependency-name: react-native-web
      - dependency-name: '@types/react'
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: ci

  - package-ecosystem: bundler
    directory: /examples/react-native
    schedule:
      interval: monthly
      day: monday
    commit-message:
      prefix: chore(ios)

  - package-ecosystem: gradle
    directory: /examples/react-native/android
    schedule:
      interval: monthly
      day: monday
    commit-message:
      prefix: chore(android)
