name: Build iOS

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-ios.yml
      - 'packages/react-native-shiki-engine/cpp/**'
      - 'packages/react-native-shiki-engine/apple/**'
      - 'packages/react-native-shiki-engine/*.podspec'
      - 'examples/react-native/ios/**'
  pull_request:
    paths:
      - .github/workflows/build-ios.yml
      - 'packages/react-native-shiki-engine/cpp/**'
      - 'packages/react-native-shiki-engine/apple/**'
      - 'packages/react-native-shiki-engine/*.podspec'
      - 'examples/react-native/ios/**'

jobs:
  build_example:
    name: Build iOS Example App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Create Node.js symlink
        run: |
          sudo ln -sf "$(which node)" /usr/local/bin/node

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm --filter react-native-shiki-engine build

      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: examples/react-native

      - name: Cache Pods
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            examples/react-native/ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        shell: bash
        working-directory: examples/react-native/ios
        run: |
          set -euo pipefail

          install_pods() {
            bundle exec pod install
          }

          if ! install_pods; then
            echo "::warning::pod install failed; cleaning iOS artifacts and retrying once"
            rm -rf Pods build
            install_pods
          fi

      - name: Build App
        run: |
          xcodebuild \
            -workspace ShikiEngineExample.xcworkspace \
            -scheme ShikiEngineExample \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            SKIP_BUNDLING=1 \
            build
        working-directory: examples/react-native/ios
