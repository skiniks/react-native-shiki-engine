name: Build Android

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-android.yml
      - 'packages/react-native-shiki-engine/cpp/**'
      - 'packages/react-native-shiki-engine/android/**'
      - 'examples/react-native/android/**'
  pull_request:
    paths:
      - .github/workflows/build-android.yml
      - 'packages/react-native-shiki-engine/cpp/**'
      - 'packages/react-native-shiki-engine/android/**'
      - 'examples/react-native/android/**'

jobs:
  build_example:
    name: Build Android Example App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          cache: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm --filter react-native-shiki-engine build

      - name: Build Android App
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: examples/react-native/android
