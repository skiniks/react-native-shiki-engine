    '@babel/core': ^7.28.5
    '@babel/preset-env': ^7.28.5
    '@babel/runtime': ^7.28.4
    babel-plugin-module-resolver: ^5.0.2
  build:
    '@release-it/conventional-changelog': ^10.0.2
    del-cli: ^7.0.0
